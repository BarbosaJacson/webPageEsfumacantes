<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/jpeg" href="foto.jpeg">
    <title>Contact Me | Jacson Barbosa</title>
    
    <style>
        /* Mantendo a identidade visual das páginas anteriores */
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #444444; 
            display: block !important; /* Isso cancela o Flexbox do style.css */
            justify-content: center;
            align-items: center;
            min-height: auto !important;
            margin: 0;
            padding: 40px 20px !important;
        }

        .container {
    display: block !important; /* Força a caixa a ser um bloco sólido */
    margin: 0 auto;           /* Centraliza a caixa cinza horizontalmente na tela */
    background: #d3d3d3; 
    padding: 50px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    max-width: 600px;
    width: 100%;
    text-align: center;       /* Garante que o texto dentro da caixa esteja centralizado */
}

        h1 { 
            margin: 0 0 30px 0; 
            font-size: 2rem; 
            color: #000; 
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #444;
            display: inline-block;
            padding-bottom: 10px;
        }

        /* Estilo dos Blocos de Contato */
        .contact-method {
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            transition: 0.3s;
        }

        .contact-method:hover {
            background: #fff;
            transform: translateY(-5px);
        }

        .contact-method h3 {
            margin: 0 0 5px 0;
            font-size: 0.9rem;
            color: #666;
            text-transform: uppercase;
        }

        .contact-method p, .contact-method a {
            margin: 0;
            font-size: 1.2rem;
            color: #222;
            text-decoration: none;
            font-weight: bold;
        }

        .contact-method a:hover {
            color: #000;
            text-decoration: underline;
        }

        .back-home {
            display: inline-block;
            margin-top: 30px;
            color: #555;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Contact Me</h1>

        <div class="contact-method">
            <h3>Phone / WhatsApp</h3>
            <a href="https://wa.me/5575999240161" target="_blank">+55 75 99924-0161</a>
        </div>

        <div class="contact-method">
            <h3>Email</h3>
            <a href="mailto:barbosajacson.jb@gmail.com">barbosajacson.jb@gmail.com</a>
        </div>

        <div class="contact-method">
            <h3>Location</h3>
            <p>
                105 Antonio Bernardino de Carvalho Ave.<br />
                Feira de Santana, Bahia - Brazil
            </p>
        </div>

        <a href="../index.html" class="back-home">← Back to Portfolio</a>
    </div>

</body>
</html>
